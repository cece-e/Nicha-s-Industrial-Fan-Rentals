<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nicha's Industrial Fan Rentals</title>

    <link rel="stylesheet" href="style.css">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
</head>
<body>

<header>
    <h1> Nicha's Industrial Fan Rentals </h1>
</header>

<form id="quotationForm">

    <h2>👤 Customer Information</h2>

    <p>👤 Client's Name</p>
    <input type="text" id="clientName" placeholder="Client Name" required>
    <br><br>

    <p>📞 Client's Number</p>
    <input type="text" id="clientNumber" placeholder="Client Number" required>
    <br><br>

    <p>📍 Client's Address</p>
    <input type="text" id="clientAddress" placeholder="Client Address" required>
    <br><br>

    <h2>📋 Rental Details</h2>

    <label>📅 Ingress Date & Time:</label>
    <input type="datetime-local" id="startDate">
    <br><br>

    <label>📅 Egress Date & Time:</label>
    <input type="datetime-local" id="endDate">
    <br><br>

    <label>📦 Quantity</label>
    <input type="number" id="quantity" min="1" required>
    <br><br>

    <label>🚚 Delivery Fee</label>
    <input type="number" id="delivery" value="0">
    <br><br>

    <label>📅 Number of Days:</label>
    <input type="number" id="days" value="1" min="1">
    <br><br>

    <label>
        <input type="checkbox" id="hasStandby">
        👷 Include Standby Personnel (₱1000/day)
    </label>
    <br><br>

    <label>💸 Discount:</label>
    <input type="number" id="discount" value="0" min="0">
    <br><br>

    <label>
        <input type="checkbox" id="hasCord">
        🔌 Extension Cord (₱150 each)
    </label>

    <input type="number" id="cordQty" value="0" min="0">
    <br><br>

    <label>
        <input type="checkbox" id="vat">
        🧾 Add 8% VAT
    </label>
    <br><br>

    <button type="button" onclick="showPreview()">
        🔍 Preview Quotation
    </button>

</form>

<div id="preview">
    <h2>📋 Quotation Preview</h2>

    <p id="p_customer"></p>
    <p id="p_contact"></p>
    <p id="p_address"></p>

    <hr>

    <p id="p_fans"></p>
    <p id="p_rental"></p>
    <p id="p_delivery"></p>
    <p id="p_cord"></p>
    <p id="p_subtotal"></p>
    <p id="p_vat"></p>
    <p id="p_dates"></p>
    <p id="p_days"></p>
    <p id="p_standby"></p>

    <hr>
    <p id="p_discount"></p>
    <h3 id="p_total"></h3>
    <hr>

    <button type="button" id="confirmBtn">
    ✅ Confirm & Save
    </button>

    <button type="button" onclick="hidePreview()">
    ✏️ Edit
    </button>

</div>


<script src="script.js"></script>
</body>
</html>
